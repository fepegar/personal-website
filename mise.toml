[tools]
typst = "latest"

[tasks.serve]
description = "Start Flask dev server"
run = "uv run flask --app main run --debug"

[tasks.fetch-pubs]
description = "Fetch publications from Google Scholar"
run = "uv run python scripts/fetch_publications.py"

[tasks.update-pubs]
description = "Fetch publications and push to GitHub"
depends = ["fetch-pubs"]
run = """
git add data/publications.json
git commit -m "Update publications data" || echo "No changes to commit"
git push
"""

[tasks.generate-cv-data]
description = "Generate cv/data.typ from Python content"
run = "uv run python scripts/generate_cv_data.py"

[tasks.build-cv]
description = "Compile Typst CVs to PDF"
depends = ["generate-cv-data"]
run = """
mkdir -p static/cv
typst compile cv/cv-short.typ static/cv/cv-short.pdf
typst compile cv/cv-long.typ static/cv/cv-long.pdf
python scripts/check_cv_pages.py
"""

[tasks.freeze]
description = "Export static site with Frozen-Flask"
run = "uv run python freeze.py"

[tasks.build]
description = "Full build pipeline"
depends = ["build-cv", "freeze"]
