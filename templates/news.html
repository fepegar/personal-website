{% extends "base.html" %}

{% block title %}News – Fernando Pérez-García{% endblock %}

{% block content %}
<h2>News</h2>
<ul class="news-list">
    {% for item in news_items %}
    <li class="news-item">
        <span class="news-date">{{ item.date | natural_date }}</span>
        <span class="news-text">{{ item.text | safe }}</span>
    </li>
    {% endfor %}
</ul>
{% endblock %}
