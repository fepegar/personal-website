name: Preview Deploy

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: jdx/mise-action@v2

      - name: Install Python dependencies
        run: uv sync

      - name: Generate CV data
        run: mise run generate-cv-data

      - name: Build CVs
        run: mise run build-cv

      - name: Freeze static site
        run: mise run freeze

      - name: Deploy preview to smokeshow
        id: smokeshow
        run: |
          output=$(uvx smokeshow upload build)
          echo "$output"
          url=$(echo "$output" | grep -oP '(?<=go to )https://\S+')
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          SMOKESHOW_GITHUB_STATUS_DESCRIPTION: Preview deploy
          SMOKESHOW_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKESHOW_GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SMOKESHOW_AUTH_KEY: ${{ secrets.SMOKESHOW_AUTH_KEY }}

      - name: Post preview URL as PR comment
        if: steps.smokeshow.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.smokeshow.outputs.url }}';
            const marker = '<!-- smokeshow-preview -->';
            const body = `${marker}\n## Preview deploy 🚀\n\n${url}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
